name: Deploy to Render

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: render-frontend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')

    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Missing GitHub Actions secret: RENDER_FRONTEND_DEPLOY_HOOK_URL"
            exit 1
          fi
          echo "Triggering Render deploy for frontend..."
          curl --fail --silent --show-error --request POST "$DEPLOY_HOOK_URL"
